name: DevSecOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint YAML & Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: k8s/ .github/workflows/
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  build-and-scan:
    name: Build Docker + Trivy scans
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local)
        run: docker build -t flask-api:ci .

      - name: Trivy - scan dependencies (filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Trivy - scan Docker image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: flask-api:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Trivy - scan image (SARIF for Security tab)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: flask-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  policy:
    name: Conftest policy (no root pods)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Install Conftest
        run: |
          curl -sSL https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz \
            | tar -xz conftest
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest on k8s manifests
        run: conftest test k8s/ -p policy/
